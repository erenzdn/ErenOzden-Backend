services:
  strapi:
    build: .
    container_name: strapi
    restart: unless-stopped
    # Host port publish yok — erişim yalnızca nginx_internal (nginx-gateway) üzerinden
    expose:
      - "1338"
    env_file: .env
    environment:
      DATABASE_HOST: strapi-db
    volumes:
      - strapi-uploads:/opt/app/public/uploads
    depends_on:
      - strapi-db
    networks:
      - default
      - nginx_internal

  strapi-db:
    image: postgres:17-alpine
    container_name: strapi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - strapi-pgdata:/var/lib/postgresql/data

volumes:
  strapi-uploads:
  strapi-pgdata:

networks:
  nginx_internal:
    external: true
    name: nginx_internal

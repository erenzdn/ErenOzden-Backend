# ============================================
# NGINX CONFIGURATION - STRAPI PRODUCTION
# Mehmet Eren Özden - mehmeterenozden.com
# ============================================
# 
# Bu dosyayı sunucunuzda şuraya kopyalayın:
# /etc/nginx/sites-available/strapi.conf
#
# Ardından sembolik link oluşturun:
# sudo ln -s /etc/nginx/sites-available/strapi.conf /etc/nginx/sites-enabled/
#
# Nginx'i test edin ve yeniden başlatın:
# sudo nginx -t && sudo systemctl reload nginx
# ============================================

# Rate limiting zone tanımları (brute-force koruması)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=5r/s;

# Upstream tanımı - Strapi backend
upstream strapi_backend {
    server 127.0.0.1:1338;
    keepalive 64;
}

# ============================================
# SERVER BLOCK 1: API Subdomain
# https://api.mehmeterenozden.com
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name api.mehmeterenozden.com;

    # HTTP -> HTTPS yönlendirmesi
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.mehmeterenozden.com;

    # SSL Sertifikaları (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/api.mehmeterenozden.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mehmeterenozden.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.mehmeterenozden.com/chain.pem;

    # Modern SSL yapılandırması
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Güvenlik başlıkları
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Dosya boyutu limiti
    client_max_body_size 50M;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # API endpoint'leri için rate limiting
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;
    }

    # Uploads klasörü için statik dosya sunumu
    location /uploads/ {
        alias /var/www/strapi/public/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Ana root - API için
    location / {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Admin panelini bu domain'den engelle
    location /admin {
        return 403;
    }

    # Sağlık kontrolü endpoint'i
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Hata sayfaları
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Log dosyaları
    access_log /var/log/nginx/api.mehmeterenozden.com.access.log;
    error_log /var/log/nginx/api.mehmeterenozden.com.error.log;
}


# ============================================
# SERVER BLOCK 2: Admin Panel Subdomain
# https://yonetimpaneli.mehmeterenozden.com
# ============================================
server {
    listen 80;
    listen [::]:80;
    server_name yonetimpaneli.mehmeterenozden.com;

    # HTTP -> HTTPS yönlendirmesi
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yonetimpaneli.mehmeterenozden.com;

    # SSL Sertifikaları (Let's Encrypt / Certbot)
    ssl_certificate /etc/letsencrypt/live/yonetimpaneli.mehmeterenozden.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yonetimpaneli.mehmeterenozden.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yonetimpaneli.mehmeterenozden.com/chain.pem;

    # Modern SSL yapılandırması
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # Güvenlik başlıkları (Admin için daha sıkı)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://api.mehmeterenozden.com market-assets.strapi.io; connect-src 'self' https://api.mehmeterenozden.com; frame-ancestors 'none';" always;

    # Dosya boyutu limiti
    client_max_body_size 50M;

    # Gzip sıkıştırma
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Root: Strapi'nin /admin path'ine yönlendir (rewrite ile)
    # Kullanıcı yonetimpaneli.mehmeterenozden.com yazdığında
    # Strapi'nin /admin'ine internal rewrite yapılır
    location = / {
        rewrite ^ /admin permanent;
    }

    # Admin paneli ve tüm alt path'leri için ana location
    # /admin, /admin/*, /admin/auth/login vb. hepsini yakalar
    location /admin {
        limit_req zone=admin_limit burst=10 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        proxy_buffering off;
    }

    # Content-Manager API'leri (Admin panelinin içerik yönetimi)
    location /content-manager/ {
        limit_req zone=admin_limit burst=10 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Content-Type-Builder API'leri
    location /content-type-builder/ {
        limit_req zone=admin_limit burst=10 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Upload endpoint'i (Admin panelden dosya yükleme)
    location /upload/ {
        limit_req zone=admin_limit burst=5 nodelay;
        client_max_body_size 100M;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        
        proxy_request_buffering off;
    }

    # Uploads klasörü için statik dosya sunumu
    location /uploads/ {
        alias /var/www/strapi/public/uploads/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # i18n plugin API'leri
    location /i18n/ {
        limit_req zone=admin_limit burst=10 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Users-Permissions plugin (Admin'den kullanıcı yönetimi için)
    location /users-permissions/ {
        limit_req zone=admin_limit burst=10 nodelay;

        proxy_pass http://strapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
    }

    # Public API endpoint'lerini bu domain'den engelle
    location /api/ {
        return 403;
    }

    # Hata sayfaları
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Log dosyaları
    access_log /var/log/nginx/yonetimpaneli.mehmeterenozden.com.access.log;
    error_log /var/log/nginx/yonetimpaneli.mehmeterenozden.com.error.log;
}
